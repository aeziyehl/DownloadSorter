name: .NET Desktop

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      Solution_Name: DownloadSorter.sln
      Project_Path: DownloadSorter/DownloadSorter.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore $env:Solution_Name

    - name: Build
      run: dotnet build $env:Solution_Name --configuration ${{ matrix.configuration }} --no-restore

    - name: Run tests
      run: dotnet test $env:Solution_Name --configuration ${{ matrix.configuration }} --no-build --verbosity normal

    - name: Publish
      run: dotnet publish $env:Project_Path -c ${{ matrix.configuration }} -o ./publish

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd ./publish
        7z a -tzip ../DownloadSorter-Release.zip *
        cd ..

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DownloadSorter-${{ matrix.configuration }}
        path: ./publish

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: DownloadSorter-Release.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
